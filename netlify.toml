# ═══════════════════════════════════════════════════════
#  netlify.toml — Fleet Maintenance Pro | HABATECH
# ═══════════════════════════════════════════════════════

[build]
  publish = "."          # dossier racine (fichier HTML à la racine)
  command = ""           # pas de build step (HTML statique)

# ── Contexte de production ──
[context.production]
  environment = { NODE_ENV = "production" }

# ── Headers globaux de sécurité & performance ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-XSS-Protection           = "1; mode=block"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy    = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn-cgi.cloudflare.com https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;
      img-src 'self' data: https:;
      frame-ancestors 'none';
    """

# ── Cache long pour assets statiques ──
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirections SPA ──
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Redirect HTTP → HTTPS ──
[[redirects]]
  from   = "http://fleet.habatech.gn/*"
  to     = "https://fleet.habatech.gn/:splat"
  status = 301
  force  = true
